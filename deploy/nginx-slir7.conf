server {
    listen 80;
    listen 443 ssl;
    server_name slir7.top;
    index index.php index.html index.htm default.php default.htm default.html;
    access_log /www/sites/slir7.top/log/access.log main;
    error_log /www/sites/slir7.top/log/error.log;

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    root /www/sites/slir7.top/index/public;

    ## gzip 压缩
    gzip on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;

    ## FastCGI 缓存 — 降低 TTFB
    set $skip_cache 0;
    ## POST 请求不缓存
    if ($request_method = POST) { set $skip_cache 1; }
    ## 带查询参数不缓存
    if ($query_string != "") { set $skip_cache 1; }
    ## 后台/交易链路不缓存
    if ($request_uri ~* "/mgx7k9p2|/livewire|/order|/check|/shopping|/message|/api") { set $skip_cache 1; }

    location /order/ {
        limit_req zone=order_limit burst=3 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location /check/ {
        limit_req zone=check_limit burst=5 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/livewire/ {
        try_files $uri /index.php?$query_string;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi-php.conf;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        ## FastCGI 缓存
        fastcgi_cache SLIR7_CACHE;
        fastcgi_cache_valid 200 1h;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 3s;

        add_header X-FastCGI-Cache $upstream_cache_status always;

        ## 缓存页面→public 10min，交易/后台链路→no-store
        if ($skip_cache = 1) {
            add_header Cache-Control "no-store, private" always;
        }
        if ($skip_cache = 0) {
            add_header Cache-Control "public, max-age=600, s-maxage=600" always;
        }
    }

    ## 静态资源 — 长缓存 + gzip
    location ~ .*\.(js|css|png|jpg|jpeg|gif|webp|ico|svg|ttf|woff|woff2|eot|otf|json|xml|mp4|webm)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    include /www/sites/slir7.top/rewrite/slir7.top.conf;

    ssl_certificate /www/sites/slir7.top/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/slir7.top/ssl/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    error_page 497 https://$host$request_uri;
}
